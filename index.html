<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are Loved</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-y: auto;
    position: relative;
    color: #5eead4;
}

.container {
    text-align: center;
    background: rgba(15, 23, 42, 0.75);
    padding: 60px 40px;
    border-radius: 30px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
}

h1, h2 {
    text-shadow: 0 0 12px rgba(94, 234, 212, 0.5);
}

h2 {
    margin: 30px 0;
}

button {
    border: 2px dashed #5eead4;
    background: none;
    color: #5eead4;
    padding: 12px 30px;
    border-radius: 40px;
    margin-top: 20px;
    cursor: pointer;
}

button:hover {
    background: #5eead4;
    color: #020617;
}

.hidden {
    display: none;
}

/* handwritten */
.handwritten {
    font-family: 'Caveat', cursive;
    font-size: 2em;
    margin-top: 20px;
    opacity: 0;
}

/* photos */
#photoWall {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.polaroid {
    width: 140px;
    height: 170px;
    background: white;
    padding: 10px;
    border-radius: 6px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.polaroid img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

/* playlist */
#musicSelector {
    margin-top: 40px;
}

.music-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.music-buttons button {
    border: 1px solid #5eead4;
    font-size: 1.5em;
    border-radius: 50%;
    padding: 10px 15px;
}

</style>
</head>

<body>

<div class="container">

<div id="stage1">
    <h1>Do you know that you are loved?</h1>
    <button onclick="nextStage()">Hmm Doubtful</button>
</div>

<div id="stage2" class="hidden">
    <h2>I LOVE YOU ❤️</h2>
    <button onclick="showLanguages()">IDK Man</button>
</div>

<div id="stage3" class="hidden">
    <h2 id="loveText">I love you</h2>
    <button onclick="nextLanguage()">IDK Man</button>

    <div id="photoWall" class="hidden"></div>

    <div id="musicSelector" class="hidden">
        <div class="music-buttons">
            <button onclick="playSong(0)">◉</button>
            <button onclick="playSong(1)">✦</button>
            <button onclick="playSong(2)">☾</button>
            <button onclick="playSong(3)">♡</button>
            <button onclick="playSong(4)">∞</button>
        </div>
    </div>

</div>

</div>

<script>

/* languages */
let currentIndex = 0;

const languages = [
"English: I love you",
"Spanish: Te amo",
"French: Je t'aime",
"German: Ich liebe dich",
"Italian: Ti amo",
"Portuguese: Eu te amo",
"Russian: Я тебя люблю",
"Japanese: 愛してる",
"Chinese: 我爱你",
"Arabic: أنا أحبك",
"Hindi: मैं तुमसे प्यार करता हूँ",
"Bengali: আমি তোমায় ভালোবাসি",
"Punjabi: ਮੈਂ ਤੈਨੂੰ ਪਿਆਰ ਕਰਦਾ ਹਾਂ",
"Urdu: میں تم سے محبت کرتا ہوں",
"Turkish: Seni seviyorum",
"Greek: Σ'αγαπώ",
"Swedish: Jag älskar dig",
"Norwegian: Jeg elsker deg",
"Dutch: Ik hou van je",
"Polish: Kocham cię",
"Thai: ฉันรักเธอ",
"Vietnamese: Anh yêu em",
"Indonesian: Aku cinta kamu",
"Filipino: Mahal kita",
"Malay: Saya cinta kamu",
"Finnish: Rakastan sinua",
"Danish: Jeg elsker dig",
"Hebrew: אני אוהב אותך",
"Persian: دوستت دارم",
"Swahili: Nakupenda",
"__FINAL__"
];

const finalMessage = `I love you.

I don’t know why… and I don’t really have reasons.
It’s just this feeling inside me that keeps wanting to bring you happiness—
even though it’s not my responsibility.

And maybe I seem a little hesitant…
but it’s only because this feeling is new to me.

You were just… easy.
Easy to talk to, easy to be around.

And I don’t want to miss what’s right in front of me anymore.

I want to stay here.

With you.
`;

function nextStage() {
    stage1.classList.add("hidden");
    stage2.classList.remove("hidden");
}

function showLanguages() {
    stage2.classList.add("hidden");
    stage3.classList.remove("hidden");
}

function nextLanguage() {
    currentIndex++;

    if (languages[currentIndex] === "__FINAL__") {
        showFinalMessage();
        return;
    }

    loveText.textContent = languages[currentIndex];
}

function showFinalMessage() {
    loveText.textContent = "";
    typeWriter(loveText, finalMessage, 0);

    setTimeout(showZuhaName, finalMessage.length * 20 + 500);
}

function typeWriter(el, text, i) {
    if (i < text.length) {
        el.textContent += text.charAt(i);
        setTimeout(() => typeWriter(el, text, i + 1), 20);
    }
}

function showZuhaName() {
    const name = document.createElement("div");
    name.className = "handwritten";
    name.style.opacity = 1;

    stage3.appendChild(name);

    const msg = "…it has always been you, Zuha ❤️";

    let i = 0;
    function type() {
        if (i < msg.length) {
            name.textContent += msg[i++];
            setTimeout(type, 60);
        }
    }
    type();

    setTimeout(() => {
        showPhotos();
        musicSelector.classList.remove("hidden");
    }, 1500);
}

function showPhotos() {
    photoWall.classList.remove("hidden");

    const imgs = ["img1.jpg", "img2.jpg"];

    imgs.forEach(src => {
        const p = document.createElement("div");
        p.className = "polaroid";
        p.innerHTML = `<img src="${src}"><div>us :)</div>`;
        photoWall.appendChild(p);
    });
}

/* music */
const playlist = [
"linger.mp3",
"fade.mp3",
"song3.mp3",
"song4.mp3",
"song5.mp3"
];

let audio = new Audio();

function playSong(i) {
    audio.src = playlist[i];
    audio.play();
}

/* foxes */
for (let i = 0; i < 20; i++) {
    const f = document.createElement("div");
    f.textContent = "🦊";
    f.style.position = "absolute";
    f.style.left = Math.random()*100+"%";
    f.style.top = Math.random()*100+"%";
    f.style.opacity = 0.2;
    document.body.appendChild(f);
}

</script>

</body>
</html>
