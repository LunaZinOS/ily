<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap');

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #5eead4;
    overflow-y: auto;
}

/* container */
.container {
    max-width: 700px;
    margin: 100px auto;
    text-align: center;
    background: rgba(15,23,42,0.7);
    padding: 60px;
    border-radius: 20px;
}

/* text */
h1,h2 {
    color: #5eead4;
    text-shadow: 0 0 10px rgba(94,234,212,0.5);
}

/* button */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid #5eead4;
    background: transparent;
    color: #5eead4;
    border-radius: 30px;
    cursor: pointer;
}
button:hover {
    background:#5eead4;
    color:#020617;
}

/* hidden */
.hidden { display:none; }

/* handwritten */
.handwritten {
    font-family: 'Caveat', cursive;
    font-size: 2em;
    margin-top: 20px;
    border-right: 2px solid #5eead4;
}

/* polaroids */
#photoWall {
    margin-top:40px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}
.polaroid {
    width:140px;
    background:white;
    padding:10px;
    transform:rotate(-3deg);
}
.polaroid img {
    width:100%;
}

/* 🎧 SIDE PLAYLIST */
#musicMenu {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.music-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 1px solid #5eead4;
    background: transparent;
    color: #5eead4;
    font-size: 18px;
    cursor: pointer;
}
.music-btn:hover {
    background:#5eead4;
    color:#020617;
}
</style>
</head>

<body>

<!-- SIDE MUSIC MENU -->
<div id="musicMenu">
    <button class="music-btn" onclick="playSong(0)">◉</button>
    <button class="music-btn" onclick="playSong(1)">✦</button>
    <button class="music-btn" onclick="playSong(2)">☾</button>
    <button class="music-btn" onclick="playSong(3)">♡</button>
    <button class="music-btn" onclick="playSong(4)">∞</button>
</div>

<div class="container">

<div id="stage1">
    <h1>Do you know that you are loved?</h1>
    <button onclick="nextStage()">Hmm Doubtful</button>
</div>

<div id="stage2" class="hidden">
    <h2>I LOVE YOU ❤️</h2>
    <button onclick="showLanguages()">IDK Man</button>
</div>

<div id="stage3" class="hidden">
    <h2 id="loveText"></h2>
    <button onclick="nextLanguage()">IDK Man</button>

    <div id="photoWall" class="hidden"></div>
</div>

</div>

<script>

/* 🎧 MUSIC */
const playlist = [
    "linger.mp3",
    "fade.mp3",
    "song3.mp3",
    "song4.mp3",
    "song5.mp3"
];

let audio = new Audio();
let currentTrack = 0;

function playSong(i){
    currentTrack = i;
    audio.src = playlist[i];
    audio.play().catch(()=>{});
}

/* 🌍 LANGUAGES */
let currentIndex = 0;

const languages = [
"English: I love you",
"Spanish: Te amo",
"French: Je t'aime",
"German: Ich liebe dich",
"Italian: Ti amo",
"Portuguese: Eu te amo",
"Russian: Я тебя люблю",
"Japanese: 愛してる",
"Chinese: 我爱你",
"Arabic: أنا أحبك",
"__FINAL__"
];

/* 💔 MESSAGE */
const finalMessage = `
I love you.

I don’t know why… I just do.
It’s this feeling that wants to bring you happiness.

And maybe I seem hesitant…
but it’s only because this is new to me.

But you…

You were so easy to talk to.
So warm… so real…

I don’t want to miss what’s in front of me anymore.

I want to stay here.

With you.
`;

/* FLOW */
function nextStage(){
    stage1.classList.add("hidden");
    stage2.classList.remove("hidden");
}

function showLanguages(){
    stage2.classList.add("hidden");
    stage3.classList.remove("hidden");
    updateLanguage();
}

function nextLanguage(){
    currentIndex++;
    if(languages[currentIndex]==="__FINAL__"){
        showFinalMessage();
        return;
    }
    updateLanguage();
}

function updateLanguage(){
    loveText.textContent = languages[currentIndex];
}

/* FINAL */
function showFinalMessage(){
    const btn = document.querySelector("#stage3 button");
    btn.style.display="none";

    loveText.textContent="";
    typeWriter(loveText, finalMessage, 0);

    setTimeout(showZuhaName, finalMessage.length*20+1000);
}

function typeWriter(el, text, i){
    if(i<text.length){
        el.textContent+=text.charAt(i);
        setTimeout(()=>typeWriter(el,text,i+1),20);
    }
}

function showZuhaName(){
    const name = document.createElement("div");
    name.className="handwritten";
    name.textContent="…it has always been you, Zuha ❤️";
    stage3.appendChild(name);

    setTimeout(showPhotos,1500);
}

/* 📸 PHOTOS */
function showPhotos(){
    const wall=document.getElementById("photoWall");
    wall.classList.remove("hidden");

    ["img1.jpg","img2.jpg"].forEach(src=>{
        const div=document.createElement("div");
        div.className="polaroid";
        div.innerHTML=`<img src="${src}">`;
        wall.appendChild(div);
    });
}

</script>

</body>
</html>
